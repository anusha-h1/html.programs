<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }

        body {
            background-color: antiquewhite;
        }

        a:link {
            color: brown;
        }

        a:visited {
            color: aquamarine;
        }

        a:hover {
            color: chartreuse;
        }

        a:active {
            color: darkmagenta
        }

        body>div:nth-child(5) {
            background-color: rgb(10, 215, 230);
        }

        body>div:nth-child(6)>div:first-child {
            background-color: black;
            color: aliceblue;
        }

        body>div:nth-child(6)>div:nth-child(2) {
            background-color: coral;
        }
        hr{height: 10px;
        color: black;
            background-color: black;}
    </style>
</head>

<body>
